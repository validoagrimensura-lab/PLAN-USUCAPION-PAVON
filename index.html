        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-33.2398804107377,-60.43624279599589],[-33.22795342576704,-60.413827318818036]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_CATASTROPlandeusucapin_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\

                    </tr>\
                    <tr>\
                        <th scope="row">PADRON_PU</th>\
                        <td>' + (feature.properties['PADRON_PU'] !== null ? autolinker.link(String(feature.properties['PADRON_PU']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">2026_Tit. Nombre</th>\
                        <td>' + (feature.properties['2026_Tit. Nombre'] !== null ? autolinker.link(String(feature.properties['2026_Tit. Nombre']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">2026_Partida Prov.</th>\
                        <td>' + (feature.properties['2026_Partida Prov.'] !== null ? autolinker.link(String(feature.properties['2026_Partida Prov.']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">2026_Manzana</th>\
                        <td>' + (feature.properties['2026_Manzana'] !== null ? autolinker.link(String(feature.properties['2026_Manzana']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\

                        <td>' + (feature.properties['2026_Lote'] !== null ? autolinker.link(String(feature.properties['2026_Lote']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\

                        <td>' + (feature.properties['2026_Anexo Titular'] !== null ? autolinker.link(String(feature.properties['2026_Anexo Titular']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">DEUDAS 06_Ctas</th>\

                    </tr>\
                    <tr>\

                    </tr>\

                    </tr>\
                    <tr>\
                        <th scope="row">MENSURA</th>\
                        <td>' + (feature.properties['MENSURA'] !== null ? autolinker.link(String(feature.properties['MENSURA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">RESOLUCIÓN</th>\
                        <td>' + (feature.properties['RESOLUCIÓN'] !== null ? autolinker.link(String(feature.properties['RESOLUCIÓN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">OBSERVACIONES</th>\
                        <td>' + (feature.properties['OBSERVACIONES'] !== null ? autolinker.link(String(feature.properties['OBSERVACIONES']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_CATASTROPlandeusucapin_1_0() {
            return {
                pane: 'pane_CATASTROPlandeusucapin_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',

                weight: 1.0, 
                fill: true,

                interactive: true,
            }
        }
        map.createPane('pane_CATASTROPlandeusucapin_1');
        map.getPane('pane_CATASTROPlandeusucapin_1').style.zIndex = 401;
        map.getPane('pane_CATASTROPlandeusucapin_1').style['mix-blend-mode'] = 'normal';
        var layer_CATASTROPlandeusucapin_1 = new L.geoJson(json_CATASTROPlandeusucapin_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_CATASTROPlandeusucapin_1',
            layerName: 'layer_CATASTROPlandeusucapin_1',
            pane: 'pane_CATASTROPlandeusucapin_1',
            onEachFeature: pop_CATASTROPlandeusucapin_1,
            style: style_CATASTROPlandeusucapin_1_0,
        });
        bounds_group.addLayer(layer_CATASTROPlandeusucapin_1);
        map.addLayer(layer_CATASTROPlandeusucapin_1);
        setBounds();
        </script>
